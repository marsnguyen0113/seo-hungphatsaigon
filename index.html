<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Phân Tích SEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div id="app" class="max-w-5xl mx-auto">
        
        <h1 class="text-2xl md:text-3xl font-bold mb-6 text-gray-800">Dashboard Phân Tích Sitemap & Nội Dung</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold mb-1">Tổng URL</h3>
                <p class="text-3xl font-bold">{{ stats.total }}</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold mb-1">Đã Index</h3>
                <p class="text-3xl font-bold">{{ stats.indexed }}</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                <h3 class="text-gray-500 text-sm font-semibold mb-1">Cần Cập Nhật (>12 tháng)</h3>
                <p class="text-3xl font-bold text-red-600">{{ stats.needsUpdate }}</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-6 text-gray-700">Phân Bố Trạng Thái Nội Dung</h2>
            <div class="w-full max-w-md mx-auto">
                <canvas id="myChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                // Dữ liệu mẫu (Sau này sẽ thay bằng đoạn code lấy từ Google Sheets)
                const stats = ref({
                    total: "1,250",
                    indexed: "1,200",
                    needsUpdate: "350"
                });

                onMounted(() => {
                    // Lệnh vẽ biểu đồ Tròn (Doughnut)
                    const ctx = document.getElementById('myChart');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Bài Mới', 'Cần Xem Xét', 'Lỗi Thời (>12 tháng)'],
                            datasets: [{
                                data: [500, 400, 350], // Số liệu mẫu của biểu đồ
                                backgroundColor: ['#22c55e', '#eab308', '#ef4444'], // Màu Xanh, Vàng, Đỏ
                                hoverOffset: 4
                            }]
                        }
                    });
                });

                return { stats }
            }
        }).mount('#app')
    </script>
</body>
</html>
